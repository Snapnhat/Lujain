<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لجونه AI - التحليل الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --text: #2c3e50; --primary: #3498db; --border: #dcdde1; --danger: #e74c3c; --accent: #2ecc71; }
        [data-theme="dark"] { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --border: #333333; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.4s; margin: 0; padding: 10px; }
        .container { width: 100%; max-width: 850px; margin: 20px auto; background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); box-sizing: border-box; }
        #authBox { width: 95%; max-width: 450px; margin: 50px auto; background: var(--card); padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .auth-input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); font-size: 16px; box-sizing: border-box; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .upload-area { border: 2px dashed var(--primary); padding: 30px; border-radius: 15px; text-align: center; cursor: pointer; background: rgba(52, 152, 219, 0.05); margin-bottom: 20px; }
        #imgPreview { max-width: 100%; max-height: 250px; object-fit: contain; display: none; margin: 15px auto; border-radius: 10px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        #resCard { margin-top: 20px; padding: 20px; border-radius: 12px; display: none; border: 2px solid var(--primary); background: rgba(52, 152, 219, 0.05); }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .history-table th { background: var(--primary); color: white; padding: 10px; }
        .history-table td { padding: 10px; text-align: center; border-bottom: 1px solid var(--border); font-size: 13px; }
    </style>
</head>
<body>

<div id="authBox">
    <h1 style="color: var(--primary); margin: 0;">لجونه AI</h1>
    <p style="opacity: 0.7; font-size: 14px;">نظام تحليل الجروح بالذكاء الاصطناعي</p>
    <input type="text" id="authId" class="auth-input" placeholder="رقم الجوال أو البريد">
    <input type="password" id="authPass" class="auth-input" placeholder="كلمة المرور">
    <button class="btn btn-primary" onclick="processAuth()">دخول / تسجيل</button>
</div>

<div class="container" id="dashboard" style="display:none;">
    <header>
        <h2 style="margin: 0; color: var(--primary);">لوحة تحكم لجونه</h2>
        <div style="display: flex; gap: 10px;">
            <button onclick="toggleTheme()" id="tBtn" style="background:none; border:none; font-size:20px; cursor:pointer;">🌙</button>
            <button class="btn" style="width:auto; padding:5px 15px; margin:0;" onclick="location.reload()">خروج</button>
        </div>
    </header>

    <div class="upload-area" onclick="document.getElementById('fInp').click()">
        <p id="upLabel">📸 ارفع صورة الجرح للتحليل العميق</p>
        <input type="file" id="fInp" hidden accept="image/*" onchange="previewFile(this)">
        <img id="imgPreview">
    </div>

    <input type="number" id="tempInp" class="auth-input" placeholder="درجة حرارة الجسم الحاليّة">
    
    <button id="analyzeBtn" class="btn btn-primary" onclick="startAIAnalysis()">بدء التحليل باستخدام Hugging Face 🧠</button>

    <div id="resCard">
        <h3 id="resTitle" style="margin-top:0;">نتائج التحليل</h3>
        <p id="resBody"></p>
        <small id="aiDetails" style="color: var(--primary);"></small>
    </div>

    <div style="margin-top: 30px;">
        <h3>📅 السجل الطبي التاريخي</h3>
        <div style="overflow-x:auto;">
            <table class="history-table">
                <thead><tr><th>التاريخ</th><th>الحرارة</th><th>التحليل</th></tr></thead>
                <tbody id="histBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- التوكن حقك مكتوب هنا بالأسفل ---
    const HF_TOKEN = "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";
    let loggedUser = null;
    let selectedBase64 = null;

    function processAuth() {
        const id = document.getElementById('authId').value;
        const pass = document.getElementById('authPass').value;
        if(!id || !pass) return alert("أدخل البيانات");
        loggedUser = id;
        document.getElementById('authBox').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadHistory();
    }

    function previewFile(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            selectedBase64 = reader.result.split(',')[1];
            document.getElementById('imgPreview').src = reader.result;
            document.getElementById('imgPreview').style.display = 'block';
            document.getElementById('upLabel').style.display = 'none';
        };
        reader.readAsDataURL(file);
    }

    async function startAIAnalysis() {
    if (!selectedBase64) return alert("يرجى رفع صورة أولاً");
    const temp = document.getElementById('tempInp').value;
    if (!temp) return alert("يرجى إدخال الحرارة");
    
    const btn = document.getElementById('analyzeBtn');
    btn.innerText = "جاري التحليل العميق...";
    btn.disabled = true;

    try {
        // تحويل الصورة من Base64 إلى Blob (بيانات خام) لأن السيرفر يفضلها
        const byteCharacters = atob(selectedBase64);
        const byteNumbers = new Array(byteCharacters.length);
        for (let i = 0; i < byteCharacters.length; i++) {
            byteNumbers[i] = byteCharacters.charCodeAt(i);
        }
        const byteArray = new Uint8Array(byteNumbers);
        const imageBlob = new Blob([byteArray], {type: 'image/jpeg'});

        const response = await fetch("https://api-inference.huggingface.co/models/google/vit-base-patch16-224", {
            headers: { 
                "Authorization": `Bearer ${HF_TOKEN}`
            },
            method: "POST",
            body: imageBlob, // إرسال الصورة مباشرة كبيانات خام
        });

        const result = await response.json();
        
        // إذا كان الموديل يحمل (Loading)
        if (result.error && result.estimated_time) {
            alert(`الموديل يستعد للعمل.. سأحاول مرة أخرى تلقائياً بعد ثوانٍ`);
            setTimeout(startAIAnalysis, 5000); // محاولة تلقائية بعد 5 ثواني
            return;
        }

        if (result.error) {
            console.error("HF Error:", result.error);
            alert("خطأ من السيرفر: " + result.error);
            return;
        }

        displayResult(result, temp);
    } catch (error) {
        console.error("Fetch Error:", error);
        alert("تعذر الوصول للسيرفر. تأكد من اتصال الإنترنت أو صلاحية التوكن.");
    } finally {
        btn.innerText = "بدء التحليل باستخدام Hugging Face 🧠";
        btn.disabled = false;
    }
}
    function displayResult(aiData, temp) {
        const card = document.getElementById('resCard');
        card.style.display = 'block';
        
        const topLabel = aiData[0]?.label || "غير معروف";
        const score = (aiData[0]?.score * 100).toFixed(2);

        let advice = "الحالة تبدو مستقرة، استمر في المتابعة والتعقيم.";
        if (temp > 38.3) {
            advice = "تنبيه: درجة الحرارة مرتفعة، قد يكون هناك التهاب نسيجي.";
        }

        document.getElementById('resBody').innerHTML = `النمط المكتشف بالذكاء الاصطناعي: <b>${topLabel}</b><br>نصيحة النظام: ${advice}`;
        document.getElementById('aiDetails').innerText = `دقة التحليل: ${score}%`;
        
        saveRecord(temp, topLabel);
    }

    function toggleTheme() {
        const h = document.documentElement;
        const btn = document.getElementById('tBtn');
        if (h.getAttribute('data-theme') === 'dark') {
            h.removeAttribute('data-theme');
            btn.innerText = '🌙';
        } else {
            h.setAttribute('data-theme', 'dark');
            btn.innerText = '☀️';
        }
    }

    function saveRecord(t, res) {
        let h = JSON.parse(localStorage.getItem('h_' + loggedUser)) || [];
        h.unshift({ date: new Date().toLocaleDateString('ar-SA'), temp: t, res: res });
        localStorage.setItem('h_' + loggedUser, JSON.stringify(h));
        loadHistory();
    }

    function loadHistory() {
        const h = JSON.parse(localStorage.getItem('h_' + loggedUser)) || [];
        document.getElementById('histBody').innerHTML = h.map(i => 
            `<tr><td>${i.date}</td><td>${i.temp}°</td><td>${i.res}</td></tr>`).join('');
    }
</script>
</body>
</html>
