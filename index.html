<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لجونه AI - التشخيص الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #3498db; --bg: #f4f7f6; --txt: #2c3e50; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 15px; text-align: center; }
        .box { max-width: 500px; margin: 30px auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-family: 'Cairo'; }
        button { background: var(--p); color: #fff; border: none; cursor: pointer; font-weight: bold; }
        #imgPrev { max-width: 100%; border-radius: 10px; display: none; margin-top: 15px; }
        .res { display: none; margin-top: 20px; padding: 15px; background: #e8f4fd; border-radius: 10px; border: 1px solid var(--p); }
    </style>
</head>
<body>

<div id="setup" class="box">
    <h2 style="color:var(--p)">إعداد نظام لجونه AI</h2>
    <p style="font-size: 14px; opacity: 0.8;">أدخل توكن Hugging Face للبدء (بدون تسريب):</p>
    <input type="password" id="userToken" placeholder="الصق التوكن هنا (hf_...)">
    <button onclick="startApp()">دخول للنظام</button>
    <p style="font-size: 12px;"><a href="https://huggingface.co/settings/tokens" target="_blank">احصل على توكن جديد من هنا</a></p>
</div>

<div id="app" class="box" style="display:none">
    <h2 style="color:var(--p)">لوحة التحليل الذكي</h2>
    <input type="file" id="fInp" accept="image/*" onchange="loadImg(this)">
    <img id="imgPrev">
    <input type="number" id="temp" placeholder="درجة الحرارة الحاليّة">
    <button id="btn" onclick="analyze()">بدء تحليل الذكاء الاصطناعي 🧠</button>
    
    <div id="resBox" class="res">
        <h4 id="resTitle"></h4>
        <p id="resBody"></p>
        <small id="resAcc"></small>
    </div>
</div>

<script>
    let ACTIVE_TOKEN = "";
    let base64Img = "";

    function startApp() {
        const t = document.getElementById('userToken').value;
        if(!t.startsWith("hf_")) return alert("التوكن غير صحيح! يجب أن يبدأ بـ hf_");
        ACTIVE_TOKEN = t;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('app').style.display = 'block';
    }

    function loadImg(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            base64Img = e.target.result.split(',')[1];
            document.getElementById('imgPrev').src = e.target.result;
            document.getElementById('imgPrev').style.display = 'block';
        }
        reader.readAsDataURL(input.files[0]);
    }

    async function analyze() {
        if(!base64Img) return alert("ارفع صورة أولاً");
        const btn = document.getElementById('btn');
        btn.innerText = "جاري الاتصال بالسيرفر العالمي...";
        btn.disabled = true;

        try {
            // تحويل الصورة لبيانات خام لضمان التوافق
            const blob = await (await fetch(`data:image/jpeg;base64,${base64Img}`)).blob();

            const response = await fetch("https://api-inference.huggingface.co/models/google/vit-base-patch16-224", {
                headers: { "Authorization": `Bearer ${ACTIVE_TOKEN}` },
                method: "POST",
                body: blob
            });

            const result = await response.json();

            if (result.error) {
                if(result.error.includes("loading")) alert("السيرفر يستعد.. انتظر 5 ثواني واضغط مرة ثانية.");
                else alert("خطأ: " + result.error);
                return;
            }

            const top = result[0];
            document.getElementById('resBox').style.display = 'block';
            document.getElementById('resTitle').innerText = "تم التحليل بنجاح ✅";
            document.getElementById('resBody').innerText = "النمط المكتشف: " + top.label;
            document.getElementById('resAcc').innerText = "الدقة: " + (top.score * 100).toFixed(2) + "%";

        } catch (e) {
            alert("فشل الاتصال! تأكد أنك تستخدم رابط (https) أو جرب متصفح كروم.");
        } finally {
            btn.innerText = "بدء تحليل الذكاء الاصطناعي 🧠";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
