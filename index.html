<!-- نفس كودك فوق بدون تغيير -->
<script>
    let mode = 'login';
    let loggedUser = null;

    function switchTab(t) {
        mode = t;
        document.getElementById('loginTab').style.background = t === 'login' ? 'var(--primary)' : '#eee';
        document.getElementById('loginTab').style.color = t === 'login' ? 'white' : '#333';
        document.getElementById('registerTab').style.background = t === 'register' ? 'var(--primary)' : '#eee';
        document.getElementById('registerTab').style.color = t === 'register' ? 'white' : '#333';
    }

    function processAuth() {
        const name = document.getElementById('authName').value;
        const id = document.getElementById('authId').value;
        const pass = document.getElementById('authPass').value;
        let users = JSON.parse(localStorage.getItem('lajona_db')) || {};

        if (mode === 'register') {
            if (users[id]) return alert("الرقم مسجل مسبقاً");
            users[id] = { name, pass };
            localStorage.setItem('lajona_db', JSON.stringify(users));
            alert("تم التسجيل! سجل دخولك الآن.");
            switchTab('login');
        } else {
            if (users[id] && users[id].pass === pass) {
                loggedUser = id;
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('welcomeMsg').innerText = `المريض: ${users[id].name}`;
                loadHistory();
            } else { alert("بيانات الدخول خاطئة"); }
        }
    }

    function validateImg(input) {
        const file = input.files[0];
        if (!file.type.startsWith('image/')) return alert("ارفع صورة فقط");
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('imgPreview').src = e.target.result;
            document.getElementById('imgPreview').style.display = 'block';
            document.getElementById('upLabel').style.display = 'none';
        }
        reader.readAsDataURL(file);
    }

    function toggleTheme() {
        const h = document.documentElement;
        if (h.getAttribute('data-theme') === 'dark') {
            h.removeAttribute('data-theme');
            document.getElementById('tBtn').innerText = '🌙';
        } else {
            h.setAttribute('data-theme', 'dark');
            document.getElementById('tBtn').innerText = '☀️';
        }
    }

    // 🔥 الدالة الجديدة (AI + تحليل)
    async function runAnalysis() {
        const t = parseFloat(document.getElementById('tempInp').value);
        const file = document.getElementById('fInp').files[0];

        if (!t) return alert("أدخل الحرارة");
        if (!file) return alert("ارفع صورة");

        const card = document.getElementById('resCard');
        card.style.display = 'block';
        document.getElementById('resTitle').innerText = "⏳ جاري تحليل الصورة...";
        document.getElementById('resBody').innerText = "انتظر شوي...";

        let aiResult = "طبيعي";

        const reader = new FileReader();
        reader.onload = async function () {
            const base64 = reader.result.split(',')[1];

            try {
                const res = await fetch("https://api-inference.huggingface.co/models/google/vit-base-patch16-224", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer 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",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ inputs: base64 })
                });

                const data = await res.json();
                console.log(data);

                if (JSON.stringify(data).includes("wound") || JSON.stringify(data).includes("infection")) {
                    aiResult = "خطر";
                }

            } catch (e) {
                console.log("AI error:", e);
            }

            // 🧠 القرار النهائي
            let status = (t > 38.3 || aiResult === "خطر") ? "خطورة عالية" : "مستقرة";

            document.getElementById('resTitle').innerText =
                status === "خطورة عالية" ? "🔴 حالة طارئة" : "🟢 حالة مستقرة";

            document.getElementById('resBody').innerText =
                status === "خطورة عالية"
                    ? "يوجد مؤشر خطر (AI + حرارة)."
                    : "الوضع طبيعي مبدئيًا.";

            card.style.background =
                status === "خطورة عالية"
                    ? "rgba(231,76,60,0.1)"
                    : "rgba(46,204,113,0.1)";

            saveRecord(t, status);
        };

        reader.readAsDataURL(file);
    }

    function saveRecord(temp, status) {
        let history = JSON.parse(localStorage.getItem('hist_' + loggedUser)) || [];
        history.unshift({ date: new Date().toLocaleDateString('ar-SA'), temp, status });
        localStorage.setItem('hist_' + loggedUser, JSON.stringify(history));
        loadHistory();
    }

    function loadHistory() {
        const h = JSON.parse(localStorage.getItem('hist_' + loggedUser)) || [];
        document.getElementById('histBody').innerHTML =
            h.map(i => `<tr><td>${i.date}</td><td>${i.temp}°</td><td>${i.status}</td></tr>`).join('');
    }

    switchTab('login');
</script>
