<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لجونه - نظام التشخيص المتجاوب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f7f6; --card: #ffffff; --text: #2c3e50; --primary: #3498db;
            --border: #dcdde1; --accent: #2ecc71; --danger: #e74c3c;
        }

        [data-theme="dark"] {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --border: #333333;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            transition: 0.4s; 
            margin: 0; 
            padding: 10px; /* تقليل البادينج للجوال */
        }

        /* حاوية مرنة تستجيب لعرض الشاشة */
        .container { 
            width: 100%;
            max-width: 850px; 
            margin: 20px auto; 
            background: var(--card); 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
            box-sizing: border-box;
        }

        /* Auth Section Responsive */
        #authBox { 
            width: 95%;
            max-width: 450px; 
            margin: 50px auto; 
            background: var(--card); 
            padding: 25px; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            box-sizing: border-box;
        }

        .auth-input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            background: var(--bg); 
            color: var(--text); 
            font-size: 16px; 
            box-sizing: border-box; 
        }

        /* Header Responsive */
        header { 
            display: flex; 
            flex-direction: row; /* افتراضي للشاشات الكبيرة */
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--border); 
            padding-bottom: 15px; 
            margin-bottom: 20px; 
            gap: 10px;
        }

        /* تعديل الهيدر للجوالات الصغيرة */
        @media (max-width: 480px) {
            header { flex-direction: column; text-align: center; }
            .grid-inputs { grid-template-columns: 1fr !important; } /* تحويل الأعمدة لصف واحد */
            .auth-tabs { flex-direction: column; }
        }

        .theme-toggle { background: var(--border); border: none; padding: 10px 15px; border-radius: 30px; cursor: pointer; font-size: 18px; }

        /* Dashboard & UI */
        #dashboard { display: none; }
        .upload-area { 
            border: 2px dashed var(--primary); 
            padding: 30px; 
            border-radius: 15px; 
            text-align: center; 
            cursor: pointer; 
            background: rgba(52, 152, 219, 0.05); 
            margin-bottom: 20px; 
        }
        #imgPreview { max-width: 100%; max-height: 250px; object-fit: contain; display: none; margin: 15px auto; border-radius: 10px; }

        .grid-inputs { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-bottom: 15px; 
        }

        .btn { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            transition: 0.3s; 
            margin-top: 10px; 
            -webkit-tap-highlight-color: transparent; /* تحسين اللمس للجوال */
        }
        .btn-primary { background: var(--primary); color: white; }

        /* History Table Responsive */
        .table-wrapper { overflow-x: auto; width: 100%; } /* تسمح بالتمرير الجانبي للجدول في الجوال */
        .history-table { width: 100%; border-collapse: collapse; margin-top: 15px; min-width: 400px; }
        .history-table th { background: var(--primary); color: white; padding: 10px; font-size: 14px; }
        .history-table td { padding: 10px; text-align: center; border-bottom: 1px solid var(--border); font-size: 13px; }

        .msg { font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div id="authBox">
    <h1 style="color: var(--primary); margin: 0; font-size: 28px;">لجونه</h1>
    <p style="opacity: 0.7; margin-bottom: 15px; font-size: 14px;">نظام الفرز الطبي الذكي</p>
    
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <button id="loginTab" style="flex:1; padding:10px; border-radius:8px; border:none; cursor:pointer;" class="active" onclick="switchTab('login')">دخول</button>
        <button id="registerTab" style="flex:1; padding:10px; border-radius:8px; border:none; cursor:pointer;" onclick="switchTab('register')">جديد</button>
    </div>

    <input type="text" id="authName" class="auth-input" placeholder="الأسم الكامل">
    <input type="text" id="authId" class="auth-input" placeholder="الجوال أو البريد">
    <input type="password" id="authPass" class="auth-input" placeholder="كلمة المرور">
    
    <button class="btn btn-primary" onclick="processAuth()">تأكيد</button>
    <p id="authMsg" class="msg" style="color: var(--danger);"></p>
</div>

<div class="container" id="dashboard">
    <header>
        <div>
            <h2 style="margin: 0; color: var(--primary); font-size: 22px;">لجونه</h2>
            <small id="welcomeMsg" style="font-size: 11px;"></small>
        </div>
        <div style="display: flex; gap: 8px;">
            <button class="theme-toggle" onclick="toggleTheme()" id="tBtn">🌙</button>
            <button onclick="location.reload()" style="background:none; border:1px solid var(--danger); color:var(--danger); border-radius:8px; cursor:pointer; padding: 5px 10px; font-size: 12px;">خروج</button>
        </div>
    </header>

    <div class="upload-area" onclick="document.getElementById('fInp').click()">
        <p id="upLabel" style="font-size: 14px;">📸 اضغط هنا لرفع صورة الجرح</p>
        <input type="file" id="fInp" hidden accept="image/*" onchange="validateImg(this)">
        <img id="imgPreview">
    </div>

    <div class="grid-inputs">
        <input type="number" id="tempInp" class="auth-input" placeholder="الحرارة °C">
        <select id="chrInp" class="auth-input">
            <option value="none">لا يوجد سكري</option>
            <option value="diabetes">مصاب بالسكري</option>
        </select>
    </div>

    <button class="btn btn-primary" onclick="runAnalysis()">تحليل الجرح 🧠</button>

    <div id="resCard" style="margin-top:20px; padding:20px; border-radius:12px; display:none;">
        <h3 id="resTitle" style="margin-top:0;"></h3>
        <p id="resBody" style="font-size:14px;"></p>
        <button class="btn" style="background:#7f8c8d; color:white; font-size:13px;" onclick="window.print()">طباعة PDF</button>
    </div>

    <div style="margin-top: 30px;">
        <h3 style="font-size: 16px;">📅 السجل الطبي</h3>
        <div class="table-wrapper">
            <table class="history-table">
                <thead>
                    <tr><th>التاريخ</th><th>الحرارة</th><th>التقييم</th></tr>
                </thead>
                <tbody id="histBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let mode = 'login';
    let loggedUser = null;

    function switchTab(t) {
        mode = t;
        document.getElementById('loginTab').style.background = t === 'login' ? 'var(--primary)' : '#eee';
        document.getElementById('loginTab').style.color = t === 'login' ? 'white' : '#333';
        document.getElementById('registerTab').style.background = t === 'register' ? 'var(--primary)' : '#eee';
        document.getElementById('registerTab').style.color = t === 'register' ? 'white' : '#333';
    }

    function processAuth() {
        const name = document.getElementById('authName').value;
        const id = document.getElementById('authId').value;
        const pass = document.getElementById('authPass').value;
        let users = JSON.parse(localStorage.getItem('lajona_db')) || {};

        if (mode === 'register') {
            if (users[id]) return alert("الرقم مسجل مسبقاً");
            users[id] = { name, pass };
            localStorage.setItem('lajona_db', JSON.stringify(users));
            alert("تم التسجيل! سجل دخولك الآن.");
            switchTab('login');
        } else {
            if (users[id] && users[id].pass === pass) {
                loggedUser = id;
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('welcomeMsg').innerText = `المريض: ${users[id].name}`;
                loadHistory();
            } else { alert("بيانات الدخول خاطئة"); }
        }
    }

    function validateImg(input) {
        const file = input.files[0];
        if (!file.type.startsWith('image/')) return alert("ارفع صورة فقط");
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('imgPreview').src = e.target.result;
            document.getElementById('imgPreview').style.display = 'block';
            document.getElementById('upLabel').style.display = 'none';
        }
        reader.readAsDataURL(file);
    }

    function toggleTheme() {
        const h = document.documentElement;
        if (h.getAttribute('data-theme') === 'dark') {
            h.removeAttribute('data-theme');
            document.getElementById('tBtn').innerText = '🌙';
        } else {
            h.setAttribute('data-theme', 'dark');
            document.getElementById('tBtn').innerText = '☀️';
        }
    }

    function runAnalysis() {
        const t = parseFloat(document.getElementById('tempInp').value);
        if (!t) return alert("أدخل الحرارة");
        const card = document.getElementById('resCard');
        card.style.display = 'block';
        let status = t > 38.3 ? "خطورة عالية" : "مستقرة";
        document.getElementById('resTitle').innerText = t > 38.3 ? "🔴 حالة طارئة" : "🟢 حالة مستقرة";
        document.getElementById('resBody').innerText = t > 38.3 ? "يوجد مؤشر التهاب حاد." : "الجرح سليم، استمر بالتعقيم.";
        card.style.background = t > 38.3 ? "rgba(231,76,60,0.1)" : "rgba(46,204,113,0.1)";
        saveRecord(t, status);
    }

    function saveRecord(temp, status) {
        let history = JSON.parse(localStorage.getItem('hist_' + loggedUser)) || [];
        history.unshift({ date: new Date().toLocaleDateString('ar-SA'), temp, status });
        localStorage.setItem('hist_' + loggedUser, JSON.stringify(history));
        loadHistory();
    }

    function loadHistory() {
        const h = JSON.parse(localStorage.getItem('hist_' + loggedUser)) || [];
        document.getElementById('histBody').innerHTML = h.map(i => `<tr><td>${i.date}</td><td>${i.temp}°</td><td>${i.status}</td></tr>`).join('');
    }
    
    // تشغيل التبويب الافتراضي
    switchTab('login');
</script>
</body>
</html>
